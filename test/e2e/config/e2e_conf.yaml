---
# E2E test scenario using local dev images and manifests built from the source tree for following providers:
# - cluster-api
# - bootstrap kubeadm
# - control-plane kubeadm
# - metal3

images:
  # Use local dev images built source tree;
  - name: quay.io/metal3-io/cluster-api-provider-metal3:latest
    loadBehavior: mustLoad
  - name: quay.io/metal3-io/baremetal-operator:latest
    loadBehavior: mustLoad
  - name: quay.io/metal3-io/ip-address-manager:latest
    loadBehavior: mustLoad

providers:
  - name: cluster-api
    type: CoreProvider
    versions:
      - name: v0.3.12
        # Use manifest from source files
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v0.3.12/core-components.yaml"
        type: "url"
        replacements:
          - old: "imagePullPolicy: Always"
            new: "imagePullPolicy: IfNotPresent"
          - old: "--enable-leader-election"
            new: "--enable-leader-election=false"
  - name: kubeadm
    type: BootstrapProvider
    versions:
      - name: v0.3.12
        # Use manifest from source files
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v0.3.12/bootstrap-components.yaml"
        type: "url"
        replacements:
          - old: "imagePullPolicy: Always"
            new: "imagePullPolicy: IfNotPresent"
          - old: "--enable-leader-election"
            new: "--enable-leader-election=false"
  - name: kubeadm
    type: ControlPlaneProvider
    versions:
      - name: v0.3.12
        # Use manifest from source files
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v0.3.12/control-plane-components.yaml"
        type: "url"
        replacements:
          - old: "imagePullPolicy: Always"
            new: "imagePullPolicy: IfNotPresent"
          - old: "--enable-leader-election"
            new: "--enable-leader-election=false"
  - name: metal3
    type: InfrastructureProvider
    versions:
    - name: v0.4.1
      value: "../../../config"
    files:
    - sourcePath: "../../../out/metadata.yaml"
      targetName: "metadata.yaml"
    - sourcePath: "../../../out/cluster-template.yaml"
      targetName: "cluster-template.yaml"

variables:
  # KUBERNETES_VERSION: "${KUBERNETES_VERSION:-v1.20.2}"
  KUBERNETES_VERSION: "v1.20.2"
  # Cluster Addons
  CNI: "./data/cni/calico/calico.yaml"
  IRONIC_URL: "https://172.22.0.2:6385/v1/"
  IRONIC_INSPECTOR_URL: "https://172.22.0.2:5050/v1/"
  DEPLOY_RAMDISK_URL: "http://172.22.0.2:6180/images/ironic-python-agent.initramfs"
  DEPLOY_KERNEL_URL: "http://172.22.0.2:6180/images/ironic-python-agent.kernel"
  IRONIC_USERNAME: "abcdefg123"
  IRONIC_PASSWORD: "abcdefg123"
  IRONIC_INSPECTOR_USERNAME: "abcdefg123"
  IRONIC_INSPECTOR_PASSWORD: "abcdefg123"
  # Target Cluster
  CAPM3_VERSION: "v1alpha4"
  IMAGE_FORMAT: "raw"
  IMAGE_CHECKSUM_TYPE: "md5"
  IMAGE_CHECKSUM: "http://172.22.0.1/images/UBUNTU_20.04_NODE_IMAGE_K8S_v1.20.2.qcow2.md5sum"
  IMAGE_URL: "http://172.22.0.1/images/UBUNTU_20.04_NODE_IMAGE_K8S_v1.20.2.qcow2"
  API_ENDPOINT_HOST: "192.168.111.249"
  API_ENDPOINT_PORT: 6443
  POD_CIDR: "192.168.0.0/18"
  SERVICE_CIDR: "10.96.0.0/12"
  CLUSTER_APIENDPOINT_HOST: "192.168.111.249"
  IRONIC_ENDPOINT_BRIDGE: "ironicendpoint"
  CTLPLANE_KUBEADM_EXTRA_CONFIG: |
    users:
    - name: metal3
      sudo: \"ALL=(ALL) NOPASSWD:ALL\"
      sshAuthorizedKeys:
      - ssh-rsa  bote@est
    preKubeadmCommands:
      - netplan apply
      - systemctl enable --now crio kubelet
      - if (curl -sk --max-time 10 https://{{ CLUSTER_APIENDPOINT_HOST }}:6443/healthz); then echo \"keepalived already running\";else systemctl start keepalived; fi
      - systemctl link /lib/systemd/system/monitor.keepalived.service
      - systemctl enable monitor.keepalived.service
      - systemctl start monitor.keepalived.service
    postKubeadmCommands:
      - mkdir -p /home/metal3/.kube
      - cp /etc/kubernetes/admin.conf /home/metal3/.kube/config
      - systemctl enable --now keepalived
      - chown metal3:metal3 /home/metal3/.kube/config
    files:
      - path: /usr/local/bin/monitor.keepalived.sh
        owner: root:root
        permissions: '0755'
        content: |
            #!/bin/bash
            while :; do
              curl -sk https://127.0.0.1:6443/healthz 1>&2 > /dev/null
              isOk=\$?
              isActive=\$(systemctl show -p ActiveState keepalived.service | cut -d'=' -f2)
              if [ \$isOk == \"0\" ] &&  [ \$isActive != \"active\" ]; then
                logger 'API server is healthy, however keepalived is not running, starting keepalived'
                echo 'API server is healthy, however keepalived is not running, starting keepalived'
                sudo systemctl start keepalived.service
              elif [ \$isOk != \"0\" ] &&  [ \$isActive == \"active\" ]; then
                logger 'API server is not healthy, however keepalived running, stopping keepalived'
                echo 'API server is not healthy, however keepalived running, stopping keepalived'
                sudo systemctl stop keepalived.service
              fi
              sleep 5
            done
      - path: /lib/systemd/system/monitor.keepalived.service
        owner: root:root
        content: |
            [Unit]
            Description=Monitors keepalived adjusts status with that of API server
            After=syslog.target network-online.target

            [Service]
            Type=simple
            Restart=always
            ExecStart=/usr/local/bin/monitor.keepalived.sh

            [Install]
            WantedBy=multi-user.target
      - path: /etc/keepalived/keepalived.conf
        content: |
          ! Configuration File for keepalived
          global_defs {
              notification_email {
              sysadmin@example.com
              support@example.com
              }
              notification_email_from lb@example.com
              smtp_server localhost
              smtp_connect_timeout 30
          }
          vrrp_instance VI_2 {
              state MASTER
              interface enp2s0
              virtual_router_id 2
              priority 101
              advert_int 1
              virtual_ipaddress {
                  {{ CLUSTER_APIENDPOINT_HOST }}
              }
          }
      - path : /etc/netplan/52-ironicendpoint.yaml
        owner: root:root
        permissions: '0644'
        content: |
          network:
            version: 2
            renderer: networkd
            bridges:
              {{ IRONIC_ENDPOINT_BRIDGE }}:
                interfaces: [enp1s0]
                addresses:
                - 172.22.0.100/24
      - path : /etc/containers/registries.conf
        content: |
          [registries.search]
          registries = ['docker.io']

          [registries.insecure]
          registries = ['{{ REGISTRY }}']

  WORKERS_KUBEADM_EXTRA_CONFIG: |
      users:
      - name: metal3
        sudo: \"ALL=(ALL) NOPASSWD:ALL\"
        sshAuthorizedKeys:
        - ssh-rsa  bote@est
      preKubeadmCommands:
        - netplan apply
        - systemctl enable --now crio kubelet
      files:
        - path : /etc/netplan/52-ironicendpoint.yaml
          owner: root:root
          permissions: '0644'
          content: |
            network:
              version: 2
              renderer: networkd
              bridges:
                {{ IRONIC_ENDPOINT_BRIDGE }}:
                  interfaces: [enp1s0]
                  addresses:
                  - 172.22.0.101/24
        - path : /etc/containers/registries.conf
          content: |
             [registries.search]
             registries = ['docker.io']
 
             [registries.insecure]
             registries = ['{{ REGISTRY }}']

intervals:
  default/wait-controllers: ["3m", "10s"]
  default/wait-cluster: ["20m", "10s"]
  default/wait-control-plane: ["30m", "10s"]
  default/wait-worker-nodes: ["30m", "10s"]
  default/wait-delete-cluster: ["20m", "10s"]
  default/wait-machine-upgrade: ["50m", "10s"]
  default/wait-machine-remediation: ["30m", "10s"]
  default/wait-deployment: ["5m", "10s"]
  default/wait-job: ["5m", "10s"]
  default/wait-service: ["3m", "10s"]
